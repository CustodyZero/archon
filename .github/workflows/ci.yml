name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build prerequisite packages
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  factory-validation:
    name: Factory Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate factory artifacts
        run: pnpm factory:validate
      - name: Derive factory state
        run: pnpm factory:derive

  invariant-checks:
    name: Invariant Checks
    runs-on: ubuntu-latest
    needs: build
    # TODO: implement static analysis that verifies:
    #   - no module can alter kernel enforcement logic
    #   - no default_enabled: true without explicit exception
    #   - no unknown capability types (Invariant I7)
    #   - restriction monotonicity (no rule expands capability)
    #   - no module auto-enables itself
    # See tools/ci/invariant-checks.md for full specification of what
    # each check must verify before v0.1 can be tagged.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: DEP-1 — runtime-host must not import module-loader
        run: bash tools/ci/check-dep-graph.sh
      - name: IC-1 — restriction monotonicity
        run: bash tools/ci/check-ic1-monotonicity.sh
      - name: IC-2 — snapshot determinism
        run: bash tools/ci/check-ic2-snapshot-determinism.sh
      - name: IC-3 — delegation non-escalation
        run: bash tools/ci/check-ic3-delegation.sh
      - name: IC-4 — no module alters kernel enforcement logic
        run: bash tools/ci/check-ic4-kernel-boundary.sh
      - name: IC-5 — no module auto-enables itself
        run: bash tools/ci/check-ic5-no-self-enable.sh
